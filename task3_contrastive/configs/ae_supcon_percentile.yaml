# AE SupCon using segnet_percentile model + percentile data
experiment_name: ae_supcon_percentile

ae_checkpoint: outputs/task1/segnet_percentile/best.pt

embed_dim: 256
temperature: 0.1

translate_frac: 0.1
noise_std: 0.02
intensity_range: [0.8, 1.2]
erase_prob: 0.3

batch_size: 128
learning_rate: 2.0e-5
min_lr: 1.0e-7
weight_decay: 1.0e-4
pretrain_epochs: 7
linear_lr: 1.0e-3
linear_epochs: 100
seed: 42
