# Fine-tune SupCon-pretrained Swin-T, last 2 stages
experiment_name: finetune_supcon_swin

data_path: data/processed/percentile/all_images.npy

encoder: swin
embed_dim: 256
pretrain_checkpoint: outputs/task3/supcon_swin/pretrained.pt

unfreeze_layers: 2
dropout: 0.1

# Differential learning rate
learning_rate_encoder: 2.0e-6
learning_rate_head: 1.0e-4
min_lr_encoder: 1.0e-8
min_lr_head: 1.0e-6

batch_size: 128
weight_decay: 1.0e-4
num_epochs: 30
patience: 10
seed: 42
