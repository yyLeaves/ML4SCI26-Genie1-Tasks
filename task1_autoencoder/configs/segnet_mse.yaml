# SegNet-style AE: MaxPool indices + FC bottleneck 512d
experiment_name: segnet_mse
model: segnet

# Data (run `python preprocess.py` first)
data_path: data/processed/perchannel_log/all_images.npy
train_split: 0.8

# Model
latent_dim: 512
encoder_channels: [32, 64, 128]

# Training
batch_size: 512
learning_rate: 3.0e-3
min_lr: 1.0e-5
weight_decay: 1.0e-5
num_epochs: 100
patience: 10
seed: 42
